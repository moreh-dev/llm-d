multinode: false

modelArtifacts:
  uri: "hf://Qwen/Qwen3-0.6B"
  name: "Qwen/Qwen3-0.6B"
  size: 2Gi
  authSecretName: "llm-d-hf-token"
  labels:
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "inference-scheduling"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: "Qwen3-32B"

routing:
  proxy:
    enabled: false  # removes sidecar from deployment - no PD in inference scheduling
    targetPort: 8000  # controls vLLM port to matchup with sidecar if deployed

accelerator:  # controls specialized hardware Type
  type: nvidia

decode:
  create: true
  parallelism:
    tensor: 1
    data: 1
  replicas: 1
  podSecurityContext:
    runAsUser: 0
    runAsGroup: 0
    runAsNonRoot: false
  monitoring:
    podmonitor:
      enabled: false # switched this
      portName: "vllm"  # decode vLLM service port (from routing.proxy.targetPort)
      path: "/metrics"
      interval: "30s"
  containers:
    - name: "vllm"
      image: ghcr.io/llm-d/llm-d-cuda:v0.5.0
      modelCommand: vllmServe
      args:
        - "--disable-uvicorn-access-log"
        - "--gpu-memory-utilization=0.95"
        # - "--tensor-parallel-size=2" # added automatically from 'parallelism'
      env:
        - name: HF_HOME
          value: "/mnt/hf-cache"
        - name: VLLM_CACHE_DIR
          value: "/mnt/vllm-cache"
      ports:
        - containerPort: 8000
          name: vllm
          protocol: TCP
      resources:
        limits:
          # nvidia.com/gpu: '2' # added automatically from 'parallelism'
          cpu: '4'
          memory: 50Gi
        requests:
          # nvidia.com/gpu: '2' # added automatically from 'parallelism'
          cpu: '4'
          memory: 50Gi
      volumeMounts:
        - name: metrics-volume
          mountPath: /.config
        - name: shm
          mountPath: /dev/shm
        - name: vllm-cache
          mountPath: /mnt/vllm-cache
        - name: hf-cache
          mountPath: /mnt/hf-cache
      startupProbe:
        httpGet:
          path: /v1/models
          port: vllm
        initialDelaySeconds: 15
        periodSeconds: 30
        timeoutSeconds: 5
        failureThreshold: 60
      livenessProbe:
        httpGet:
          path: /health
          port: vllm
        periodSeconds: 10
        timeoutSeconds: 5
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /v1/models
          port: vllm
        periodSeconds: 5
        timeoutSeconds: 2
        failureThreshold: 3
  volumes:
    - name: metrics-volume
      emptyDir: {}
    - name: shm
      emptyDir:
        medium: Memory
        sizeLimit: 20Gi
    - name: vllm-cache
      hostPath:
        path: /mnt/filesystem-x7/vllm-cache
        type: DirectoryOrCreate
    - name: hf-cache
      hostPath:
        path: /mnt/filesystem-x7/hf-cache
        type: DirectoryOrCreate

# PD disabled in this example
prefill:
  create: false
