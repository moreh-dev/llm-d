apiVersion: leaderworkerset.x-k8s.io/v1
kind: LeaderWorkerSet
metadata:
  name: wide-ep-gb200-decode
  labels:
    llm-d.ai/inferenceServing: "true"
    llm-d.ai/model: DeepSeek-R1-NVFP4
    llm-d.ai/role: decode
spec:
  replicas: 1
  leaderWorkerTemplate:
    size: 2
    workerTemplate:
      metadata:
        labels:
          llm-d.ai/inferenceServing: "true"
          llm-d.ai/model: DeepSeek-R1-NVFP4
          llm-d.ai/role: decode
      spec:
        serviceAccountName: wide-ep-gb200
        volumes:
          - name: dshm
            emptyDir:
              medium: Memory
              sizeLimit: 2Gi
          - name: lustre
            persistentVolumeClaim:
              claimName: lustre-pvc-vllm
        resourceClaims:
          - name: compute-domain-channel
            resourceClaimTemplateName: llm-d-dev-claim
        initContainers:
          # Routing sidecar coordinates prefill/decode disaggregation
          - name: routing-proxy
            args:
              - --port=8000
              - --vllm-port=8200
              - --connector=nixlv2
              - --zap-log-level=debug
              - --secure-proxy=false
            image: ghcr.io/llm-d/llm-d-routing-sidecar:latest
            imagePullPolicy: Always
            ports:
              - containerPort: 8000
            resources: {}
            restartPolicy: Always
            securityContext:
              allowPrivilegeEscalation: false
              runAsNonRoot: true
        containers:
          - name: vllm
            image: quay.io/tms/llm-d-cuda-dev:nvfp4_deepep_ht-arm64
            securityContext:
              capabilities:
                add:
                  - IPC_LOCK
                  - SYS_RAWIO
              runAsGroup: 0
              runAsUser: 0
            imagePullPolicy: Always
            command:
              - /bin/bash
              - -c
            args:
              - |-
                #################
                # RUN vLLM decode worker with NIXL connector
                #################
                uv pip uninstall pplx-kernels

                START_RANK=$(( ${LWS_WORKER_INDEX:-0} * DP_SIZE_LOCAL ))
                source /opt/vllm/bin/activate
                exec vllm serve \
                  nvidia/DeepSeek-R1-NVFP4 \
                  --port 8200 \
                  --disable-uvicorn-access-log \
                  --enable-expert-parallel \
                  --data-parallel-hybrid-lb \
                  --data-parallel-size $((LWS_GROUP_SIZE * DP_SIZE_LOCAL)) \
                  --data-parallel-size-local $DP_SIZE_LOCAL \
                  --data-parallel-address ${LWS_LEADER_ADDRESS} \
                  --data-parallel-rpc-port 5555 \
                  --data-parallel-start-rank $START_RANK \
                  --trust-remote-code \
                  --kv_transfer_config '{"kv_connector":"NixlConnector",
                                         "kv_role":"kv_both",
                                         "kv_load_failure_policy":"fail"}' \
                  --async-scheduling \
                  --all2all-backend "deepep_low_latency" \
                  --compilation_config '{"cudagraph_mode": "FULL_DECODE_ONLY"}' \
                  --gpu-memory-utilization 0.85 \
                  --max-num-batched-tokens $VLLM_MOE_DP_CHUNK_SIZE

            env:
              - name: VLLM_MOE_DP_CHUNK_SIZE
                value: "512"  # vLLM default is 256

              # HuggingFace token and cache location
              - name: HF_TOKEN
                valueFrom:
                  secretKeyRef:
                    name: hf-secret
                    key: HF_TOKEN
                    optional: true
              - name: HF_HOME
                value: /mnt/lustre/hf_cache

              # Compile caches - persist across restarts for faster startup
              - name: VLLM_CACHE_ROOT
                value: /mnt/lustre/tms/vllm_cache
              - name: FLASHINFER_CACHE_DIR
                value: /mnt/lustre/tms/flashinfer_cache

              # Data parallelism - GPUs per pod
              - name: DP_SIZE_LOCAL
                value: "4"

              - name: VLLM_DEEPEP_LOW_LATENCY_ALLOW_NVLINK
                value: "1"
              - name: VLLM_DEEPEP_LOW_LATENCY_USE_MNNVL
                value: "1"

              # Common vLLM settings
              - name: TRITON_LIBCUDA_PATH
                value: /usr/lib64
              - name: VLLM_RANDOMIZE_DP_DUMMY_INPUTS
                value: "1"
              - name: VLLM_USE_DEEP_GEMM
                value: "1"
              - name: NVIDIA_GDRCOPY
                value: enabled

              # Override container default that disables VMM
              # VMM is required for fabric memory / MNNVL cross-pod communication
              - name: NVSHMEM_DISABLE_CUDA_VMM
                value: "0"

              # NIXL side channel for KV cache coordination
              - name: VLLM_NIXL_SIDE_CHANNEL_HOST
                valueFrom:
                  fieldRef:
                    fieldPath: status.podIP

              # UCX configuration for NIXL - use only working InfiniBand devices
              # Excluded: mlx5_2/5 are Ethernet/RoCE with no GID configured, mlx5_6 is DOWN
              - name: UCX_NET_DEVICES
                value: "mlx5_0:1,mlx5_1:1,mlx5_3:1,mlx5_4:1"

              # Engine startup timeout (default 600s, increase for large models over network storage)
              - name: VLLM_ENGINE_READY_TIMEOUT_S
                value: "1800"

              # Debug logging
              - name: VLLM_LOGGING_LEVEL
                value: INFO
              - name: NCCL_DEBUG
                value: INFO
              - name: NVSHMEM_DEBUG
                value: INFO
            ports:
              - containerPort: 8200
                name: http
                protocol: TCP
            readinessProbe:
              httpGet:
                path: /health
                port: 8200
              initialDelaySeconds: 60
              periodSeconds: 10
            resources:
              claims:
                - name: compute-domain-channel
              limits:
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
              requests:
                cpu: 32
                ephemeral-storage: 128Gi
                memory: 512Gi
                nvidia.com/gpu: "4"
            volumeMounts:
              - mountPath: /dev/shm
                name: dshm
              - mountPath: /mnt/lustre
                name: lustre
            workingDir: /code
