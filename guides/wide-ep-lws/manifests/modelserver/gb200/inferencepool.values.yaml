# InferencePool for GB200 with P/D disaggregation
# Uses unique name for shared namespace

inferenceExtension:
  replicas: 1
  flags:
    kv-cache-usage-percentage-metric: "vllm:kv_cache_usage_perc"
    v: 1
  image:
    name: llm-d-inference-scheduler
    hub: ghcr.io/llm-d
    tag: v0.4.0
  extProcPort: 9002
  monitoring:
    interval: "10s"
    secret:
      name: wide-ep-gb200-sa-metrics-reader-secret
    prometheus:
      enabled: false
    gke:
      enable: false
  pluginsConfigFile: "custom-plugins.yaml"
  pluginsCustomConfig:
    custom-plugins.yaml: |
      # P/D disaggregation with random routing
      apiVersion: inference.networking.x-k8s.io/v1alpha1
      kind: EndpointPickerConfig
      plugins:
      - type: prefill-header-handler
      - type: prefill-filter
      - type: decode-filter
      - type: random-picker
        parameters:
          maxNumOfEndpoints: 1
      - type: pd-profile-handler
        parameters:
          threshold: 0
          hashBlockSize: 5
      schedulingProfiles:
      - name: prefill
        plugins:
        - pluginRef: prefill-filter
        - pluginRef: random-picker
      - name: decode
        plugins:
        - pluginRef: decode-filter
        - pluginRef: random-picker

inferencePool:
  # IMPORTANT: Unique name for shared namespace
  # Change this if deploying alongside others in the same namespace
  name: wide-ep-gb200-infpool
  modelServers:
    matchLabels:
      llm-d.ai/inferenceServing: "true"
      llm-d.ai/model: DeepSeek-R1-NVFP4

provider:
  name: istio
  istio:
    destinationRule:
      # Must match the inferencePool.name with -epp suffix
      host: wide-ep-gb200-infpool-epp
      trafficPolicy:
        tls:
          mode: SIMPLE
          insecureSkipVerify: true
        connectionPool:
          http:
            http1MaxPendingRequests: 256000
            maxRequestsPerConnection: 256000
            http2MaxRequests: 256000
            idleTimeout: "900s"
          tcp:
            maxConnections: 256000
            maxConnectionDuration: "1800s"
            connectTimeout: "900s"
