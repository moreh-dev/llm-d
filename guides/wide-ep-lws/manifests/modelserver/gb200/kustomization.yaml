apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  # P/D disaggregated mode (prefill + decode with NIXL)
  - prefill.yaml
  - decode.yaml
  - serviceAccount.yaml

  # Unified mode (single LWS, no P/D) - uncomment to use instead
  # - modelserver.yaml
  # - serviceAccount.yaml

# Uncomment to set a different namespace
# namespace: vllm

# Uncomment to add a name prefix for uniqueness
# namePrefix: tms-
