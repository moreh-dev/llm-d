apiVersion: v1
kind: Service
metadata:
  name: deepseek-r1-tp8
  labels:
    app: deepseek-r1-tp8
spec:
  type: ClusterIP
  selector:
    app: deepseek-r1-tp8
  ports:
    - name: vllm
      port: 8000
      targetPort: vllm
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deepseek-r1-tp8
  labels:
    app: deepseek-r1-tp8
    llm-d.ai/inference-serving: "true"
    llm-d.ai/guide: "wide-ep-deploy"
    llm-d.ai/accelerator-variant: "gpu"
    llm-d.ai/accelerator-vendor: "nvidia"
    llm-d.ai/model: DeepSeek-R1-0528
    llm-d.ai/role: decode
spec:
  replicas: 4
  selector:
    matchLabels:
      app: deepseek-r1-tp8
  template:
    metadata:
      labels:
        app: deepseek-r1-tp8
    spec:
      volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        - name: hf-cache
          hostPath:
            path: /mnt/filesystem-x7/vllm-cache
            type: DirectoryOrCreate
        - name: jit-cache
          hostPath:
            path: /mnt/filesystem-x7/vllm-cache
            type: DirectoryOrCreate

      containers:
        - name: vllm
          image: ghcr.io/llm-d/llm-d-cuda:v0.5.0
          imagePullPolicy: Always
          securityContext:
            runAsGroup: 0
            runAsUser: 0
          command: ["/bin/bash", "-c"]
          args:
            - |-
              # Clear /dev/shm on start to prevent running out of space when crashes occur
              # https://github.com/llm-d/llm-d/issues/352
              find /dev/shm -type f -delete

              exec vllm serve \
                deepseek-ai/DeepSeek-R1-0528 \
                --port 8000 \
                --trust-remote-code \
                --tensor-parallel-size 8
          env:
            - name: VLLM_USE_FLASHINFER_MOE_FP8
              value: "1"
            - name: VLLM_FLASHINFER_MOE_BACKEND
              value: "latency"
            - name: HF_HUB_CACHE
              value: /var/cache/huggingface

          ports:
            - containerPort: 8000
              name: vllm
              protocol: TCP

          startupProbe:
            httpGet:
              path: /health
              port: vllm
            initialDelaySeconds: 0
            periodSeconds: 1
            timeoutSeconds: 5
            failureThreshold: 2700
          livenessProbe:
            httpGet:
              path: /health
              port: vllm
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /v1/models
              port: vllm
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          resources:
            requests:
              cpu: "32"
              memory: 512Gi
              nvidia.com/gpu: "8"
            limits:
              cpu: "32"
              memory: 512Gi
              nvidia.com/gpu: "8"

          volumeMounts:
            - name: dshm
              mountPath: /dev/shm
            - name: hf-cache
              mountPath: /var/cache/huggingface
            - name: jit-cache
              mountPath: /var/cache/vllm
---
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: deepseek-r1-tp8-podmonitor
spec:
  selector:
    matchLabels:
      app: deepseek-r1-tp8
  podMetricsEndpoints:
    # For decode service, this is port 8200. Must use port name.
    - port: "vllm"
      path: /metrics
      interval: 5s